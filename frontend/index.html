<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEEK</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            margin: 0;
        }
        .captcha-box {
            background: white;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 250px;
            justify-content: space-between;
            cursor: pointer;
        }
        .captcha-box:hover {
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }
        .captcha-text {
            font-size: 14px;
            color: #333;
        }
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #c1c1c1;
            border-radius: 3px;
            display: inline-block;
            transition: all 0.2s;
        }
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .checkmark {
            display: none;
            color: green;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="captcha-box" id="captcha-widget" onclick="startVerification()">
        <div id="checkbox" class="checkbox"></div>
        <div id="spinner" class="spinner"></div>
        <div id="checkmark" class="checkmark">✓</div>
        <span class="captcha-text">I Think Therefore I Am</span>
        <span style="font-size: 10px; color: #888;">BC certified</span>
    </div>

    <script>
        async function startVerification() {
            document.getElementById('checkbox').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('captcha-widget').onclick = null;
            document.getElementById('captcha-widget').style.cursor = 'default';

            const collectedData = gatherTelemetryData();

            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(collectedData)
                });

                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('spinner').style.display = 'none';
                    document.getElementById('checkmark').style.display = 'block';
                }
            } catch (error) {
                console.error("Något gick fel med serveranropet:", error);
            }
        }

        function gatherTelemetryData() {
            console.log("Datainsamling startad...");
            // TODO: Här sparar vi musrörelser senare
            return { message: "Platshållardata från frontend" };
        }
    </script>

</body>
</html>
